site_name: 三晳资料 Wiki
site_description: 三晳资料本地知识库生成的公开摘要 Wiki
site_url: https://zlzzq.github.io/TaiJi-Wiki/
repo_url: https://github.com/zlzzq/TaiJi-Wiki
repo_name: zlzzq/TaiJi-Wiki
docs_dir: docs
site_dir: site
use_directory_urls: true

theme:
  name: material
  language: zh
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: brown
      accent: amber

plugins:
  - search:
      lang:
        - zh
        - en
  - glightbox
  - minify:
      minify_html: true

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

extra_css:
  - assets/wiki.css
extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js

nav:
  - 首页: index.md
  - 学习:
    - 概念总图: learning/concept-map.md
    - 学习路径: learning/path.md
    - 教学模板: learning/teaching-playbook.md
    - 示例问答: learning/demo-qa.md
  - 术语:
    - 核心术语表: terms/glossary.md
    - 术语索引: terms/index.md
  - 资料:
    - 资料总览: sources/index.md
    - 待补证资料: sources/pending.md
  - 专题:
    - 专题索引: topics/index.md
    - "三晳九境": topics/sanxi-nine-realms.md
  - 资料摘要:
